<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - TechZone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="nav-left">
        <a href="index.html" class="logo">
            <img src="./images/logo.png" alt="TechZone Logo">
        </a>
        <a href="#">Store</a>
        <a href="#">Mobile</a>
        <a href="#">Laptop</a>
        <a href="#">Tablet</a>
        <a href="#">Accessories</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
    <div class="nav-right">
        <div class="search-box">
            <input type="text" class="search-bar" placeholder="Search...">
            <button class="search-btn">
                <img class="loupe" src="./images/loupe.png" alt="Search">
            </button>
        </div>
        <a href="cart.html" class="bag">
            <img src="./images/bag.png" alt="Bag">
        </a>
    </div>
</header>

<!-- CHECKOUT PAGE -->
<section class="checkout-page">

    <h1 class="checkout-title">Checkout</h1>
    <p class="checkout-sub">Fill in your details to complete your order</p>

    <div class="checkout-layout">

        <!-- LEFT: Form -->
        <div class="checkout-form-box">

            <!-- Delivery Info -->
            <div class="form-section">
                <h2 class="form-section-title">Delivery Information</h2>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full-name" placeholder="John Doe">
                    <span class="error-msg" id="error-name"></span>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@email.com">
                    <span class="error-msg" id="error-email"></span>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+213 000 000 000">
                    <span class="error-msg" id="error-phone"></span>
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" placeholder="123 Main Street">
                    <span class="error-msg" id="error-address"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="city" placeholder="Constantine">
                        <span class="error-msg" id="error-city"></span>
                    </div>
                    <div class="form-group">
                        <label>Postal Code</label>
                        <input type="text" id="postal" placeholder="25000">
                        <span class="error-msg" id="error-postal"></span>
                    </div>
                </div>

            </div>

            <!-- Payment Info -->
            <div class="form-section">
                <h2 class="form-section-title">Payment Details</h2>

                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19">
                    <span class="error-msg" id="error-card"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Expiry Date</label>
                        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
                        <span class="error-msg" id="error-expiry"></span>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="3">
                        <span class="error-msg" id="error-cvv"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Name on Card</label>
                    <input type="text" id="card-name" placeholder="John Doe">
                    <span class="error-msg" id="error-card-name"></span>
                </div>

            </div>

            <button class="place-order-btn" onclick="placeOrder()">
                Place Order →
            </button>

        </div>

        <!-- RIGHT: Order Summary -->
        <div class="checkout-summary-box">
            <div class="summary-title">Order Summary</div>
            <div id="checkout-items"></div>
            <div class="summary-divider"></div>

            <div class="summary-row">
                <span>Subtotal</span>
                <span id="checkout-subtotal">0.00$</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span id="checkout-shipping">0.00$</span>
            </div>

            <div class="summary-divider"></div>

            <div class="summary-total">
                <span class="summary-total-label">Total</span>
                <span class="summary-total-amount" id="checkout-total">0.00$</span>
            </div>
        </div>

    </div>

</section>

<!-- Success Popup -->
<div class="success-overlay" id="success-overlay">
    <div class="success-box">
        <div class="success-icon">✓</div>
        <h2>Order Placed!</h2>
        <p>Thank you for your purchase. Your order is being processed.</p>
        <a href="index.html" class="success-btn">Back to Home</a>
    </div>
</div>

<script>

// --- Load cart and show summary ---
function getCart() {
    return JSON.parse(localStorage.getItem("cart")) || [];
}

function parsePrice(price) {
    if (typeof price === "number") return price;
    return parseFloat(String(price).replace(/[^0-9.]/g, "")) || 0;
}

function formatPrice(num) {
    return parseFloat(num).toFixed(2) + "$";
}

function loadSummary() {
    const cart = getCart();
    const container = document.getElementById("checkout-items");

    if (cart.length === 0) {
        container.innerHTML = "<p style='color:#999;font-size:14px;'>No items in cart.</p>";
        return;
    }

    let html = "";
    let subtotal = 0;

    cart.forEach(item => {
        const lineTotal = parsePrice(item.price) * item.quantity;
        subtotal += lineTotal;

        html += `
            <div class="checkout-item">
                <img src="${item.image || ''}" alt="${item.name}"
                     onerror="this.style.display='none'">
                <div class="checkout-item-info">
                    <p class="checkout-item-name">${item.name}</p>
                    <p class="checkout-item-variant">${item.storage || ''} ${item.color ? '· ' + item.color : ''}</p>
                    <p class="checkout-item-qty">Qty: ${item.quantity}</p>
                </div>
                <p class="checkout-item-price">${formatPrice(lineTotal)}</p>
            </div>
        `;
    });

    const shipping = subtotal > 500 ? 0 : 9.99;
    const total = subtotal + shipping;

    container.innerHTML = html;
    document.getElementById("checkout-subtotal").textContent = formatPrice(subtotal);
    document.getElementById("checkout-shipping").textContent = shipping === 0 ? "Free" : formatPrice(shipping);
    document.getElementById("checkout-total").textContent = formatPrice(total);
}

// --- Format card number with spaces ---
document.getElementById("card-number").addEventListener("input", function() {
    let val = this.value.replace(/\D/g, "").substring(0, 16);
    this.value = val.match(/.{1,4}/g)?.join(" ") || val;
});

// --- Format expiry date ---
document.getElementById("expiry").addEventListener("input", function() {
    let val = this.value.replace(/\D/g, "").substring(0, 4);
    if (val.length >= 2) val = val.substring(0, 2) + "/" + val.substring(2);
    this.value = val;
});

// --- Validation ---
function showError(id, msg) {
    document.getElementById(id).textContent = msg;
}

function clearErrors() {
    document.querySelectorAll(".error-msg").forEach(el => el.textContent = "");
}

function validateForm() {
    clearErrors();
    let valid = true;

    const name = document.getElementById("full-name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const city = document.getElementById("city").value.trim();
    const postal = document.getElementById("postal").value.trim();
    const cardNumber = document.getElementById("card-number").value.trim();
    const expiry = document.getElementById("expiry").value.trim();
    const cvv = document.getElementById("cvv").value.trim();
    const cardName = document.getElementById("card-name").value.trim();

    if (!name) { showError("error-name", "Full name is required"); valid = false; }
    if (!email || !email.includes("@")) { showError("error-email", "Valid email is required"); valid = false; }
    if (!phone) { showError("error-phone", "Phone number is required"); valid = false; }
    if (!address) { showError("error-address", "Address is required"); valid = false; }
    if (!city) { showError("error-city", "City is required"); valid = false; }
    if (!postal) { showError("error-postal", "Postal code is required"); valid = false; }
    if (cardNumber.replace(/\s/g, "").length < 16) { showError("error-card", "Valid card number is required"); valid = false; }
    if (expiry.length < 5) { showError("error-expiry", "Valid expiry date is required"); valid = false; }
    if (cvv.length < 3) { showError("error-cvv", "Valid CVV is required"); valid = false; }
    if (!cardName) { showError("error-card-name", "Name on card is required"); valid = false; }

    return valid;
}

// --- Place Order ---
function placeOrder() {
    if (!validateForm()) return;

    // Clear cart
    localStorage.removeItem("cart");

    // Show success popup
    document.getElementById("success-overlay").style.display = "flex";
}

loadSummary();

</script>
</body>
</html>
